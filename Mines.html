<style>
/* Стили для красивой 3D-анимации переворота ячеек */
.cell {
    perspective: 1000px;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
}

/* Контейнер для звезды внутри перевернутой ячейки */
.star-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Мягкий темный фон под звездой для контраста */
    background: radial-gradient(circle, rgba(0, 0, 0, 0.25) 0%, rgba(10, 20, 38, 0.5) 100%);
    border-radius: inherit;
    z-index: 99;
    pointer-events: none;
    
    transform-style: preserve-3d;
    animation: flipAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}

/* Яркая желто-золотая звезда */
.star-icon {
    width: 80%;
    height: 80%;
    /* Мягкое золотисто-желтое свечение вокруг звезды */
    filter: drop-shadow(0 0 14px rgba(255, 200, 0, 0.85)) drop-shadow(0 4px 6px rgba(0, 0, 0, 0.6));
}

@keyframes flipAppear {
    0% {
        transform: rotateY(-90deg) scale(0.5);
        opacity: 0;
    }
    100% {
        transform: rotateY(0deg) scale(1);
        opacity: 1;
    }
}

.select-traps__btn, 
[class*="btn_minus"], 
[class*="btn_plus"],
.select-traps img,
.select-traps svg {
    cursor: pointer !important;
    user-select: none;
}
/* Стиль для ячейки с крестиком */
.cross-container {
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle, rgba(0, 0, 0, 0.2) 0%, rgba(40, 10, 10, 0.5) 100%) !important;
}

/* Анимация появления крестика */
.cross-container svg {
    animation: flipAppear 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const playBtn = document.getElementById("playButton");
    const trapValues = [1, 3, 5, 7];
    let currentLevelIndex = 0;
// === НАСТРОЙКА РЕЖИМА "SWITCH TO ALL" ===
    let currentMode = 'single'; 
    const modeBtn = document.getElementById('modeButton') || document.querySelector('[class*="mode"]'); 

    if (modeBtn) {
        modeBtn.addEventListener('click', function() {
            if (currentMode === 'single') {
                currentMode = 'all';
                modeBtn.textContent = 'Switch to Single';
                modeBtn.classList.add('active'); 
            } else {
                currentMode = 'single';
                modeBtn.textContent = 'Switch to All';
                modeBtn.classList.remove('active');
            }
            console.log("Режим изменен на:", currentMode);
        });
    }
    // =========================================

    const trapsAmountEl = document.getElementById("trapsAmount") || 
                          document.querySelector(".select-traps__traps_amount") ||
                          document.querySelector("[data-traps]") ||
                          document.querySelector(".traps-count") ||
                          document.querySelector(".select-traps__container span") ||
                          document.querySelector(".select-traps span");

    const btnMinus = document.querySelector(".select-traps__btn_minus") || 
                     document.querySelector("[class*='minus']") || 
                     document.querySelector("[class*='prev']") ||
                     (trapsAmountEl ? trapsAmountEl.previousElementSibling : null);

    const btnPlus = document.querySelector(".select-traps__btn_plus") || 
                    document.querySelector("[class*='plus']") || 
                    document.querySelector("[class*='next']") ||
                    (trapsAmountEl ? trapsAmountEl.nextElementSibling : null);

    function updateTrapsDisplay() {
        if (trapsAmountEl) {
            const currentVal = trapValues[currentLevelIndex];
            if (trapsAmountEl.childNodes.length > 1) {
                for (let node of trapsAmountEl.childNodes) {
                    if (node.nodeType === Node.TEXT_NODE && /\d/.test(node.nodeValue)) {
                        node.nodeValue = currentVal;
                        break;
                    } else if (node.tagName === "SPAN" || node.className && node.className.includes("amount")) {
                        node.textContent = currentVal;
                        break;
                    }
                }
            } else {
                trapsAmountEl.textContent = currentVal;
            }
        }
    }

    if (btnMinus) {
        btnMinus.addEventListener("click", function(e) {
            e.preventDefault();
            if (currentLevelIndex > 0) {
                currentLevelIndex--;
                updateTrapsDisplay();
            }
        });
    }

    if (btnPlus) {
        btnPlus.addEventListener("click", function(e) {
            e.preventDefault();
            if (currentLevelIndex < trapValues.length - 1) {
                currentLevelIndex++;
                updateTrapsDisplay();
            }
        });
    }

    if (playBtn) {
        playBtn.removeAttribute("disabled");
        playBtn.style.opacity = "1";
        playBtn.style.cursor = "pointer";

        playBtn.addEventListener("click", function(e) {
            e.preventDefault();
            
            if (playBtn.classList.contains("animating")) return;
            playBtn.classList.add("animating");

            const cells = document.querySelectorAll(".cell");
            if (cells.length === 0) {
                playBtn.classList.remove("animating");
                return;
            }

            cells.forEach(cell => {
                cell.classList.remove("revealed", "has-star");
                const customStar = cell.querySelector(".star-container");
                if (customStar) customStar.remove();
            });

            const activeTraps = trapValues[currentLevelIndex];
            let starsToOpen = 5;
            if (activeTraps === 1) {
                starsToOpen = 7;
            } else if (activeTraps === 3) {
                starsToOpen = 5;
            } else if (activeTraps === 5) {
                starsToOpen = 4;
            } else if (activeTraps === 7) {
                starsToOpen = 3;
            }
// Перезаписываем количество звёзд, если включен режим "ALL"
if (currentMode === 'all') {
    starsToOpen = 25 - activeTraps; 
}

            if (starsToOpen > cells.length) starsToOpen = cells.length;

            const starIndices = [];
            while (starIndices.length < starsToOpen) {
                const randIndex = Math.floor(Math.random() * cells.length);
                if (!starIndices.includes(randIndex)) {
                    starIndices.push(randIndex);
                }
            }

           // === НАЧАЛО ОБНОВЛЕННОГО БЛОКА ОТКРЫТИЯ ЯЧЕЕК ===
    let delay = 0;

    // Определяем, какие индексы ячеек перебирать
    // Если "all" — перебираем абсолютно все 25 ячеек поля, если "single" — только выбранные звезды
    const targetIndices = currentMode === 'all' 
        ? Array.from({ length: cells.length }, (_, i) => i) 
        : starIndices;

    targetIndices.forEach((index, i) => {
        // Создаем отдельную функцию отрисовки для каждой ячейки
        const renderCell = () => {
            const cell = cells[index];
            cell.style.position = "relative";
            
            const container = document.createElement("div");
            
            // Проверяем: это звезда или мина?
            if (starIndices.includes(index)) {
                // ТВОЙ ОБНОВЛЕННЫЙ ЯРКО ЖЕЛТО-ЗОЛОТОЙ SVG ИЗ СКРИНШОТА
                container.className = "star-container";
                container.innerHTML = `
                    <svg class="star-icon" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="yellowGold" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#FFFFE0"/>
                                <stop offset="30%" stop-color="#FFE600"/>
                                <stop offset="85%" stop-color="#FF9F00"/>
                                <stop offset="100%" stop-color="#E85C00"/>
                            </linearGradient>
                            <linearGradient id="warm3D" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stop-color="#C24000"/>
                                <stop offset="100%" stop-color="#5C1000"/>
                            </linearGradient>
                            <linearGradient id="topGloss" x1="0" y1="0" x2="1" y2="1">
                                <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
                                <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0"/>
                            </linearGradient>
                        </defs>
                        <g transform="translate(2, 2)">
                            <path d="M25 1.5 L32.5 15.5 L47.5 17.5 L36.5 28 L39.5 43 L25 35.5 L10.5 43 L13.5 28 L2.5 17.5 L17.5 15.5 Z" fill="url(#warm3D)" transform="translate(0, 3.2)"/>
                            <path d="M25 1.5 L32.5 15.5 L47.5 17.5 L36.5 28 L39.5 43 L25 35.5 L10.5 43 L13.5 28 L2.5 17.5 L17.5 15.5 Z" fill="url(#yellowGold)" stroke="#D14700" stroke-width="0.9" stroke-linejoin="round"/>
                            <path d="M25 2.5 L31.5 15 L25 18 L18.5 15 Z" fill="url(#topGloss)"/>
                        </g>
                    </svg>
                `;
                cell.appendChild(container);
                cell.classList.add("revealed", "has-star");
            } else {
                // ОРИГИНАЛЬНЫЙ НЕОНОВЫЙ КРЕСТИК ИЗ 1WIN ДЛЯ МИН
                container.className = "star-container cross-container";
                container.innerHTML = `
                    <svg viewBox="0 0 56 56" width="56" height="56" xmlns="http://www.w3.org/2000/svg">
                        <path d="M14 14L42 42M42 14L14 42" stroke="#ff3838" stroke-width="5.5" stroke-linecap="round" filter="drop-shadow(0 0 8px rgba(255, 56, 56, 0.8))"/>
                    </svg>
                `;
                cell.appendChild(container);
                cell.classList.add("revealed", "has-cross");
            }

            // Когда дошли до самого конца списка, разблокируем кнопку старта
            if (i === targetIndices.length - 1) {
                playBtn.classList.remove("animating");
            }
        };

        // --- ВОТ ЗДЕСЬ РАЗДЕЛЯЕМ РЕЖИМЫ НА СКОРОСТЬ ---
        if (currentMode === 'all') {
            renderCell(); // В режиме ALL запускаем мгновенно в ту же миллисекунду без таймеров!
        } else {
            setTimeout(renderCell, delay); // В режиме Single оставляем твой поочередный таймер
            delay += 500; 
        }
    });
});
}
});
</script>
</body>
</html>
